<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  
  <title>FocusTube+ 📚✨</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #16213e 100%);
      color: #eee;
      position: relative;
      overflow-x: hidden;
    }
    
    /* Background Pattern */
    body::before {
      content: "📚 📝 🎓 💡 📖 ✏️ 🔬 📐 🧮 📊 📈 🎯 🏆 ⭐ 💎 🌟";
      position: fixed;
      top: 0;
      left: 0;
      width: 200%;
      height: 200%;
      font-size: 24px;
      opacity: 0.05;
      animation: float 20s infinite linear;
      z-index: -1;
      pointer-events: none;
    }
    
    @keyframes float {
      0% { transform: translate(-50px, -50px) rotate(0deg); }
      100% { transform: translate(-50px, -50px) rotate(360deg); }
    }
    
    /* Om Namah Shivaya Glow */
    .om-namah-shivaya {
      color: #ffffff;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
      animation: smoothWhiteGlow 3s ease-in-out infinite;
    }
    
    @keyframes smoothWhiteGlow {
      0%, 100% { text-shadow: 0 0 10px rgba(255, 255, 255, 0.6); }
      50% { text-shadow: 0 0 20px rgba(255, 255, 255, 0.9); }
    }
    
    /* Title Glow */
    .focus-tube-glow {
      background: linear-gradient(45deg, #8b5cf6, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 15px rgba(139, 92, 246, 0.4));
    }
    
    /* RESPONSIVE PLAYER CONTAINER (Fixes Mobile) */
    #player-container {
      width: 100%;
      max-width: 1200px;
      /* Remove fixed height, use aspect ratio for mobile responsiveness */
      aspect-ratio: 16 / 9; 
      height: auto;
      background: #000;
      border-radius: 0.75rem;
      overflow: hidden;
      margin: 0 auto;
      box-shadow: 0 0 50px rgba(0, 255, 136, 0.2);
      border: 2px solid rgba(0, 255, 136, 0.3);
      position: relative;
    }
    
    #player-container iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    
    /* Status Overlay */
    #video-status {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.85);
      padding: 15px 25px;
      border-radius: 15px;
      border: 1px solid #00ff88;
      z-index: 10;
      color: #00ff88;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
      width: 80%; /* Prevent overflow on small screens */
      text-align: center;
    }
    #video-status.show { opacity: 1; }

    /* Inputs */
    .glow-input {
      background: rgba(26, 26, 46, 0.9);
      border: 2px solid rgba(0, 255, 136, 0.3);
      color: white;
    }
    .glow-button {
      background: linear-gradient(45deg, #ff0080, #00ff88);
      box-shadow: 0 0 20px rgba(255, 0, 128, 0.5);
    }
    .glow-button-blue {
      background: linear-gradient(45deg, #00ccff, #0080ff);
    }
    
    /* Hide unwanted elements */
    .study-float { display: none; } /* Hide floating emojis on mobile to save space */
    @media (min-width: 768px) {
      .study-float { display: block; position: absolute; opacity: 0.1; pointer-events: none; animation: floatStudy 6s ease-in-out infinite; }
    }
    @keyframes floatStudy {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(180deg); }
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center">
  
  <div class="w-full text-center py-2">
    <h1 class="text-lg font-medium om-namah-shivaya"> 🕉 నమః శివాయ 🙏 </h1>
  </div>
  
  <div class="study-float" style="top: 15%; left: 5%; font-size: 3rem;">🎓</div>
  <div class="study-float" style="top: 25%; right: 5%; font-size: 2.5rem;">📚</div>

  <div class="w-full relative z-10 px-4 pb-10">
    <header class="text-center mb-6 mt-4">
      <h1 class="text-4xl md:text-6xl font-bold focus-tube-glow mb-2" onclick="scrollToTop()">✨ FocusTube+ ✨</h1>
      <p class="text-lg text-cyan-400 mb-2">🎯 Study without distractions</p>
    </header>

    <div class="flex flex-col md:flex-row gap-3 mb-4 max-w-3xl mx-auto">
      <input id="url" type="text"
             placeholder="🔗 Paste YouTube URL..." 
             class="w-full px-4 py-3 glow-input rounded-lg focus:outline-none text-lg"/>
      <button id="loadBtn" class="w-full md:w-auto px-6 py-3 glow-button text-white font-bold rounded-lg text-lg">
        🚀 Load
      </button>
    </div>
    
    <div id="status" class="h-6 text-center text-lg font-semibold mb-4 max-w-3xl mx-auto"></div>

    <div id="player-container" class="hidden mb-6">
      <div id="video-status"></div>
    </div>

    <section id="notes" class="hidden max-w-3xl mx-auto w-full mt-8">
      <h2 class="text-2xl font-bold mb-3 text-center text-gray-300">📝 Study Notes</h2>
      <textarea id="notesArea"
                class="glow-input w-full h-48 rounded-lg p-4 text-lg focus:outline-none"
                placeholder="✏️ Type your notes here..."></textarea>
      <div class="flex justify-center mt-4">
        <button id="saveNotes" class="px-6 py-3 glow-button-blue text-white font-bold rounded-lg text-lg">
          💾 Save Notes
        </button>
      </div>
    </section>
  </div>

  <script>
    const urlInput = document.getElementById('url');
    const loadBtn  = document.getElementById('loadBtn');
    const status   = document.getElementById('status');
    const pc       = document.getElementById('player-container');
    const notesSec = document.getElementById('notes');
    const notesA   = document.getElementById('notesArea');
    const saveBtn  = document.getElementById('saveNotes');
    let currentId = '';

    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

    function extractID(url) {
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
      const match = url.match(regExp);
      return (match && match[2].length === 11) ? match[2] : null;
    }

    function showStatus(msg, err = false) {
      status.innerHTML = err ? `❌ ${msg}` : `✅ ${msg}`;
      status.className = err ? 'text-red-400 font-bold animate-pulse' : 'text-green-400 font-bold';
    }

    function loadVideo() {
      const vid = extractID(urlInput.value.trim());
      if (!vid) return showStatus('Invalid URL!', true);
      
      showStatus('🎬 Loading...');

      if (currentId) sessionStorage.setItem('notes_' + currentId, notesA.value);
      currentId = vid;

      // --- FIX FOR ERROR 153 & MOBILE START ---
      const iframe = document.createElement('iframe');
      
      // 1. Standard Embed URL (No Origin Param - FIXES ERROR 153)
      iframe.src = `https://www.youtube.com/embed/${vid}?controls=1&rel=0&modestbranding=1&playsinline=1&iv_load_policy=3`;
      
      // 2. Strict Referrer Policy (Crucial for Azure/Mobile)
      iframe.setAttribute('referrerpolicy', 'strict-origin-when-cross-origin');
      
      // 3. Permissions
      iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
      iframe.allowFullscreen = true;
      // --- FIX END ---

      pc.innerHTML = '';
      const newStatusDiv = document.createElement('div');
      newStatusDiv.id = 'video-status';
      pc.appendChild(newStatusDiv);
      pc.appendChild(iframe);
      
      pc.classList.remove('hidden');
      notesSec.classList.remove('hidden');
      status.innerHTML = '';
      
      setTimeout(() => {
        const overlay = document.getElementById('video-status');
        if(overlay) {
          overlay.innerHTML = '✅ Video Loaded!';
          overlay.classList.add('show');
          setTimeout(() => overlay.classList.remove('show'), 2000);
        }
      }, 800);

      notesA.value = sessionStorage.getItem('notes_' + vid) || '';
    }

    function saveNotes() {
      if (!currentId) return;
      sessionStorage.setItem('notes_' + currentId, notesA.value);
      
      const filename = `FocusTube_Notes_${currentId}.txt`;
      const blob = new Blob([notesA.value], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      showStatus('💾 Notes Saved!');
    }

    loadBtn.addEventListener('click', loadVideo);
    urlInput.addEventListener('keypress', e => { if (e.key === 'Enter') loadVideo(); });
    saveBtn.addEventListener('click', saveNotes);
  </script>
</body>
</html>
