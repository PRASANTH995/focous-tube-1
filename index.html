<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
  
  <title>FocusTube+ 📚✨</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  
  <style>
    /* Modern Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }

    body {
      font-family: 'Inter', sans-serif;
      /* Zen Night Gradient */
      background: radial-gradient(circle at top, #1e293b 0%, #0f172a 60%, #020617 100%);
      color: #cbd5e1;
      position: relative;
      overflow-x: hidden;
      min-height: 100vh;
    }
    
    /* Background Particles */
    body::before {
      content: "✨ 📚 🎓 💡 🚀 🪐 📝 🔬 📐 🎨 🎵 🏆";
      position: fixed;
      top: 0;
      left: 0;
      width: 150%;
      height: 150%;
      font-size: 30px;
      opacity: 0.015;
      animation: float 45s infinite linear;
      z-index: -1;
      pointer-events: none;
      filter: blur(3px);
      line-height: 150px;
      letter-spacing: 100px;
    }
    
    @keyframes float {
      0% { transform: translate(-20px, -20px) rotate(0deg); }
      100% { transform: translate(-50px, -100px) rotate(360deg); }
    }
    
    /* Glassmorphism */
    .glass-panel {
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
    }

    .om-text {
      background: linear-gradient(90deg, #fbbf24, #d97706);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(251, 191, 36, 0.15);
      font-weight: 600;
      letter-spacing: 1px;
    }
    
    .focus-title {
      background: linear-gradient(135deg, #5eead4 0%, #93c5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 15px rgba(94, 234, 212, 0.2));
    }
    
    /* Player Container - Fixed Mobile Width */
    #player-container {
      /* w-full handles width, aspect-ratio handles height automatically */
      aspect-ratio: 16 / 9; 
      background: #000;
      border-radius: 1rem;
      overflow: hidden;
      margin: 0 auto;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.05);
      position: relative;
    }
    
    #player-container iframe {
      width: 90%;
      height: 80%;
      border: 0;
      display: block;
    }
    
    /* Inputs & Buttons */
    .glass-input {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: #e2e8f0;
      transition: all 0.3s ease;
    }
    .glass-input:focus {
      background: rgba(30, 41, 59, 0.8);
      border-color: #5eead4;
      box-shadow: 0 0 20px rgba(94, 234, 212, 0.1);
    }
    
    .modern-btn {
      background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
    }
    .modern-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5);
      filter: brightness(1.1);
    }
    .modern-btn:active { transform: translateY(0); }

    .download-btn {
      background: linear-gradient(135deg, #14b8a6 0%, #0ea5e9 100%);
      box-shadow: 0 4px 15px rgba(20, 184, 166, 0.3);
    }
    .download-btn:hover { box-shadow: 0 8px 25px rgba(20, 184, 166, 0.5); }

    /* Status Overlay */
    #video-status {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(8px);
      padding: 1rem 2rem;
      border-radius: 50px;
      border: 1px solid rgba(94, 234, 212, 0.3);
      color: #5eead4;
      opacity: 0;
      pointer-events: none;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      width: max-content;
      max-width: 90%;
      font-weight: 500;
      letter-spacing: 0.5px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    #video-status.show { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }

  </style>
</head>
<body class="flex flex-col items-center">
  
  <div class="w-full text-center py-3 glass-panel border-b border-white/5 mb-8">
    <h1 class="text-sm md:text-base om-text">🕉 నమః శివాయ 🙏</h1>
  </div>

  <div class="w-full max-w-[1600px] px-4 pb-20 relative z-10 flex flex-col gap-8">
    
    <header class="text-center">
      <h1 class="text-5xl md:text-7xl font-bold focus-title mb-4 tracking-tight cursor-pointer" onclick="scrollToTop()">
        FocusTube+
      </h1>
      <p class="text-lg md:text-xl text-slate-400 font-light">
        Distraction-free learning environment 🎯
      </p>
    </header>

    <div class="glass-panel p-2 rounded-2xl flex flex-col md:flex-row gap-2 shadow-2xl max-w-4xl mx-auto w-full">
      <input id="url" type="text"
             placeholder="🔗 Paste YouTube URL here..." 
             class="w-full px-6 py-4 rounded-xl glass-input text-lg outline-none placeholder-slate-500"/>
      <button id="loadBtn" class="w-full md:w-auto px-8 py-4 rounded-xl modern-btn text-white font-bold text-lg whitespace-nowrap flex items-center justify-center gap-2">
        <span>🚀</span> Load Video
      </button>
    </div>
    
    <div id="status" class="h-6 text-center text-sm font-medium text-emerald-400"></div>

    <div id="player-container" class="w-full hidden opacity-0 transition-opacity duration-700 ease-in">
      <div id="video-status"></div>
    </div>

    <section id="notes" class="hidden opacity-0 transition-all duration-700 ease-in translate-y-10">
      <div class="glass-panel rounded-2xl p-6 md:p-8 relative overflow-hidden group">
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-teal-500/10 rounded-full blur-3xl group-hover:bg-teal-500/20 transition-all duration-500"></div>
        
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-2xl font-bold text-slate-200 flex items-center gap-3">
            <span>📝</span> Study Notes
          </h2>
          <span class="text-xs text-slate-500 bg-white/5 px-3 py-1 rounded-full border border-white/5">Auto-saves locally</span>
        </div>
        
        <textarea id="notesArea"
                  class="w-full h-64 rounded-xl glass-input p-6 text-lg outline-none resize-none leading-relaxed text-slate-200"
                  placeholder="Type your key insights here..."></textarea>
                  
        <div class="flex justify-end mt-6">
          <button id="saveNotes" class="px-8 py-3 rounded-xl download-btn text-white font-bold text-lg flex items-center gap-2">
            <span>💾</span> Save as PDF
          </button>
        </div>
      </div>
    </section>
  </div>

  <script>
    const urlInput = document.getElementById('url');
    const loadBtn  = document.getElementById('loadBtn');
    const status   = document.getElementById('status');
    const pc       = document.getElementById('player-container');
    const notesSec = document.getElementById('notes');
    const notesA   = document.getElementById('notesArea');
    const saveBtn  = document.getElementById('saveNotes');
    let currentId = '';

    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

    function extractID(url) {
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
      const match = url.match(regExp);
      return (match && match[2].length === 11) ? match[2] : null;
    }

    function showStatus(msg, err = false) {
      status.innerHTML = err ? `❌ ${msg}` : `✨ ${msg}`;
      status.className = err ? 'h-6 text-center text-sm font-bold text-rose-400 animate-pulse' : 'h-6 text-center text-sm font-bold text-emerald-400';
    }

    function loadVideo() {
      const vid = extractID(urlInput.value.trim());
      if (!vid) return showStatus('Invalid URL! Please check the link.', true);
      
      showStatus('Loading video...');

      if (currentId) sessionStorage.setItem('notes_' + currentId, notesA.value);
      currentId = vid;

      const iframe = document.createElement('iframe');
      // Force Width/Height attributes for mobile stability
      iframe.width = "100%";
      iframe.height = "100%";
      iframe.className = "w-full h-full"; 
      
      iframe.src = `https://www.youtube.com/embed/${vid}?controls=1&rel=0&modestbranding=1&playsinline=1&iv_load_policy=3`;
      iframe.setAttribute('referrerpolicy', 'strict-origin-when-cross-origin');
      iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
      iframe.allowFullscreen = true;

      pc.innerHTML = '';
      const newStatusDiv = document.createElement('div');
      newStatusDiv.id = 'video-status';
      pc.appendChild(newStatusDiv);
      pc.appendChild(iframe);
      
      // Reveal
      pc.classList.remove('hidden');
      notesSec.classList.remove('hidden');
      
      setTimeout(() => {
        pc.classList.remove('opacity-0');
        notesSec.classList.remove('opacity-0', 'translate-y-10');
      }, 50);

      status.innerHTML = '';
      
      setTimeout(() => {
        const overlay = document.getElementById('video-status');
        if(overlay) {
          overlay.innerHTML = '✨ Video Loaded Successfully';
          overlay.classList.add('show');
          setTimeout(() => overlay.classList.remove('show'), 2000);
        }
      }, 1000);

      notesA.value = sessionStorage.getItem('notes_' + vid) || '';
    }

    function saveNotes() {
      if (!currentId) return;
      
      sessionStorage.setItem('notes_' + currentId, notesA.value);
      
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      
      doc.setFillColor(245, 245, 250);
      doc.rect(0, 0, 210, 297, 'F');
      
      doc.setFont("helvetica", "bold");
      doc.setFontSize(22);
      doc.setTextColor(50, 50, 80);
      doc.text("Study Notes", 20, 25);
      
      doc.setFontSize(10);
      doc.setTextColor(100, 100, 150);
      doc.text("Generated via FocusTube+", 20, 32);
      doc.text(new Date().toLocaleString(), 150, 32);
      
      doc.setDrawColor(200, 200, 220);
      doc.setLineWidth(0.5);
      doc.line(20, 38, 190, 38);
      
      doc.setFont("helvetica", "normal");
      doc.setFontSize(12);
      doc.setTextColor(30, 30, 30);
      
      const textLines = doc.splitTextToSize(notesA.value, 170);
      doc.text(textLines, 20, 50);
      
      const filename = `FocusTube_Notes_${currentId}.pdf`;
      doc.save(filename);
      
      showStatus('PDF Downloaded! 📂');
    }

    loadBtn.addEventListener('click', loadVideo);
    urlInput.addEventListener('keypress', e => { if (e.key === 'Enter') loadVideo(); });
    saveBtn.addEventListener('click', saveNotes);
  </script>
</body>
</html>
