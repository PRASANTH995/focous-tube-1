<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>FocusTube+ 📚✨</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #16213e 100%);
      color: #eee;
      position: relative;
      overflow-x: hidden;
    }
    
    /* Animated background pattern with study emojis */
    body::before {
      content: "📚 📝 🎓 💡 📖 ✏️ 🔬 📐 🧮 📊 📈 🎯 🏆 ⭐ 💎 🌟 📚 📝 🎓 💡 📖 ✏️ 🔬 📐 🧮 📊 📈 🎯 🏆 ⭐ 💎 🌟";
      position: fixed;
      top: 0;
      left: 0;
      width: 200%;
      height: 200%;
      font-size: 24px;
      opacity: 0.05;
      animation: float 20s infinite linear;
      z-index: -1;
      line-height: 80px;
      letter-spacing: 60px;
      pointer-events: none;
    }
    
    @keyframes float {
      0% { transform: translate(-50px, -50px) rotate(0deg); }
      100% { transform: translate(-50px, -50px) rotate(360deg); }
    }
    
    /* Small Om Namah Shivaya with smooth white glow */
    .om-namah-shivaya {
      color: #ffffff;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.6), 
                   0 0 20px rgba(255, 255, 255, 0.4),
                   0 0 30px rgba(255, 255, 255, 0.2);
      animation: smoothWhiteGlow 3s ease-in-out infinite;
    }
    
    @keyframes smoothWhiteGlow {
      0%, 100% { 
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.6), 
                     0 0 20px rgba(255, 255, 255, 0.4),
                     0 0 30px rgba(255, 255, 255, 0.2);
      }
      50% { 
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.9), 
                     0 0 40px rgba(255, 255, 255, 0.7),
                     0 0 60px rgba(255, 255, 255, 0.5);
      }
    }
    
    /* FocusTube+ with smooth purple glow in and out */
    .focus-tube-glow {
      background: linear-gradient(45deg, #8b5cf6, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
      animation: smoothPurpleGlow 2.5s ease-in-out infinite;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    
    .focus-tube-glow:hover {
      transform: scale(1.02);
    }
    
    @keyframes smoothPurpleGlow {
      0%, 100% { 
        filter: drop-shadow(0 0 15px rgba(139, 92, 246, 0.4));
        text-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
      }
      50% { 
        filter: drop-shadow(0 0 35px rgba(139, 92, 246, 0.8));
        text-shadow: 0 0 40px rgba(139, 92, 246, 0.8);
      }
    }
    
    /* Normal text for My Study Notes - matches environment */
    .normal-notes-text {
      color: #d1d5db; /* Light gray to match the surrounding environment */
    }
    
    /* Colorful subtitle text */
    .colorful-subtitle {
      color: #00ccff;
      text-shadow: 0 0 10px rgba(0, 204, 255, 0.5);
    }
    
    /* Colorful description text */
    .colorful-description {
      background: linear-gradient(90deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* Enhanced container with study vibes */
    #player-container {
      width: 100%;
      max-width: 1200px;
      height: 675px;
      background: linear-gradient(135deg, #000 0%, #1a1a2e 100%);
      border-radius: 0.75rem;
      overflow: hidden;
      margin: 0 auto;
      box-shadow: 0 0 50px rgba(0, 255, 136, 0.2), 
                  inset 0 0 50px rgba(0, 204, 255, 0.1);
      border: 2px solid rgba(0, 255, 136, 0.3);
      position: relative;
    }
    
    #player-container iframe {
      width: 100%;
      height: 100%;
      border: 0;
      position: absolute; /* Ensure iframe sits behind status */
      top: 0;
      left: 0;
      z-index: 1;
    }
    
    /* Centered status message over video */
    #video-status {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      padding: 20px 30px;
      border-radius: 15px;
      border: 2px solid rgba(0, 255, 136, 0.5);
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
      z-index: 100;
      font-size: 1.5rem;
      font-weight: bold;
      text-align: center;
      color: #00ff88;
      text-shadow: 0 0 10px rgba(0, 255, 136, 0.8);
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
      pointer-events: none;
    }
    
    #video-status.show {
      opacity: 1;
    }
    
    /* Enhanced notes area */
    #notesArea {
      width: 100%;
      height: 150px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border: 2px solid rgba(0, 255, 136, 0.3);
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
    }
    
    /* Glowing buttons */
    .glow-button {
      background: linear-gradient(45deg, #ff0080, #00ff88);
      box-shadow: 0 0 20px rgba(255, 0, 128, 0.5);
      transition: all 0.3s ease;
    }
    
    .glow-button:hover {
      box-shadow: 0 0 30px rgba(255, 0, 128, 0.8);
      transform: translateY(-2px);
    }
    
    .glow-button-blue {
      background: linear-gradient(45deg, #00ccff, #0080ff);
      box-shadow: 0 0 20px rgba(0, 204, 255, 0.5);
    }
    
    .glow-button-blue:hover {
      box-shadow: 0 0 30px rgba(0, 204, 255, 0.8);
      transform: translateY(-2px);
    }
    
    /* Enhanced input field */
    .glow-input {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border: 2px solid rgba(0, 255, 136, 0.3);
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
    }
    
    .glow-input:focus {
      border-color: rgba(0, 255, 136, 0.6);
      box-shadow: 0 0 25px rgba(0, 255, 136, 0.3);
    }
    
    /* Floating study elements */
    .study-float {
      position: absolute;
      animation: floatStudy 6s ease-in-out infinite;
      opacity: 0.1;
      pointer-events: none;
    }
    
    @keyframes floatStudy {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(180deg); }
    }
    
    /* Hide unwanted YT controls */
    .ytp-miniplayer-button,
    .ytp-size-button {
      display: none !important;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center">
  <div class="w-full text-center py-2">
    <h1 class="text-lg font-medium om-namah-shivaya"> 🕉 నమః శివాయ 🙏 </h1>
  </div>

  <div class="study-float" style="top: 15%; left: 5%; font-size: 3rem;">🎓</div>
  <div class="study-float" style="top: 25%; right: 5%; font-size: 2.5rem; animation-delay: -2s;">📚</div>
  <div class="study-float" style="top: 65%; left: 3%; font-size: 2rem; animation-delay: -4s;">💡</div>
  <div class="study-float" style="top: 75%; right: 8%; font-size: 3.5rem; animation-delay: -1s;">⭐</div>
  <div class="study-float" style="top: 45%; left: 2%; font-size: 2rem; animation-delay: -3s;">🔬</div>
  <div class="study-float" style="top: 35%; right: 3%; font-size: 2.5rem; animation-delay: -5s;">🏆</div>

  <div class="w-full relative z-10 px-4">
    <header class="text-center mb-6 mt-6">
      <h1 class="text-6xl font-bold focus-tube-glow mb-2" onclick="scrollToTop()">✨ FocusTube+ ✨</h1>
      <p class="text-xl colorful-subtitle mb-2">🎯 Study without distractions</p>
      <p class="text-lg colorful-description">📚 Take notes • 🚀 Level up your learning!</p>
    </header>

    <div class="flex gap-3 mb-4 max-w-3xl mx-auto">
      <input id="url" type="text"
             placeholder="🔗 Paste your YouTube learning video URL here..." 
             class="flex-1 px-4 py-3 glow-input text-white rounded-lg focus:outline-none text-lg"/>
      <button id="loadBtn" class="px-6 py-3 glow-button text-white font-bold rounded-lg text-lg">
        🚀 Load Video
      </button>
    </div>
    
    <div id="status" class="h-6 text-center text-lg font-semibold mb-4 max-w-3xl mx-auto"></div>

    <div id="player-container" class="hidden mb-6">
      <div id="video-status"></div>
    </div>

    <section id="notes" class="hidden max-w-3xl mx-auto w-full mt-12">
      <h2 class="text-3xl font-bold mb-3 text-center mt-8">
        <span class="normal-notes-text">📝 My Study Notes 📝</span>
      </h2>
      <textarea id="notesArea"
                class="glow-input text-white rounded-lg focus:outline-none p-4 text-lg"
                placeholder="✏️ Take your learning notes here... 
📝 Key insights, timestamps, important concepts...
🧠 Your knowledge vault awaits! 🎓"></textarea>
      <div class="flex justify-center mt-4">
        <button id="saveNotes" class="px-6 py-3 glow-button-blue text-white font-bold rounded-lg text-lg">
          💾 Save My Notes 📄
        </button>
      </div>
    </section>
  </div>

  <script>
    const urlInput = document.getElementById('url');
    const loadBtn  = document.getElementById('loadBtn');
    const status   = document.getElementById('status');
    const pc       = document.getElementById('player-container');
    const notesSec = document.getElementById('notes');
    const notesA   = document.getElementById('notesArea');
    const saveBtn  = document.getElementById('saveNotes');
    let currentId = '';

    // Home page functionality
    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function extractID(url) {
      const patterns = [
        /(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([^&#?]{11})/,
        /youtube\.com\/watch\?.*v=([^&#]{11})/
      ];
      for (let p of patterns) {
        const m = url.match(p);
        if (m) return m[1];
      }
      return null;
    }

    function showStatus(msg, err = false) {
      status.innerHTML = err ? `❌ ${msg}` : `✅ ${msg}`;
      status.className = err ? 'text-red-400 font-bold animate-pulse' : 'text-green-400 font-bold';
    }

    function loadVideo() {
      const vid = extractID(urlInput.value.trim());
      
      if (!vid) {
        return showStatus('Invalid YouTube URL! Please check your link 🔗', true);
      }
      
      showStatus('🎬 Loading your study video...');

      // Save notes for previous video before switching
      if (currentId) {
        sessionStorage.setItem('notes_' + currentId, notesA.value);
      }
      currentId = vid;

      const iframe = document.createElement('iframe');
      
      // FIX: Use window.location.origin to fix configuration errors
      const origin = window.location.origin;
      
      // FIX: Switched to standard youtube.com domain
      iframe.src = `https://www.youtube.com/embed/${vid}`
                 + `?controls=1&rel=0&modestbranding=1`
                 + `&cc_load_policy=1&iv_load_policy=3&playsinline=1`
                 + `&origin=${origin}`; // Crucial for preventing Error 153
                 
      iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
      iframe.allowFullscreen = true;

      // Clear previous content
      pc.innerHTML = '';
      
      // Re-add the status overlay div (it gets wiped by innerHTML = '')
      const newStatusDiv = document.createElement('div');
      newStatusDiv.id = 'video-status';
      pc.appendChild(newStatusDiv);
      pc.appendChild(iframe);
      
      pc.classList.remove('hidden');
      notesSec.classList.remove('hidden');

      status.innerHTML = '';
      
      // Show the "Video Loaded" overlay
      setTimeout(() => {
        const statusOverlay = document.getElementById('video-status');
        if(statusOverlay) {
            statusOverlay.innerHTML = '✅ 🎉 Video loaded! Happy studying! 📚✨';
            statusOverlay.classList.add('show');
            
            setTimeout(() => {
              statusOverlay.classList.remove('show');
            }, 3000);
        }
      }, 1000);

      // Load saved notes for this specific video
      notesA.value = sessionStorage.getItem('notes_' + vid) || '';
    }

    function saveNotes() {
      if (!currentId) return;
      sessionStorage.setItem('notes_' + currentId, notesA.value);
      
      // Try to get title, fallback to ID if blocked by cross-origin
      let title = currentId;
      try {
        // This often fails due to CORS, but we keep it just in case
        title = document.querySelector('#player-container iframe').title || currentId;
      } catch {}
      
      const filename = 'FocusTube_' + title.replace(/[<>:"/\\|?*]/g, '_') + '_notes.txt';
      const blob = new Blob([notesA.value], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      
      showStatus('💾 Notes saved successfully! Keep learning! 🌟');
    }

    // Event Listeners
    loadBtn.addEventListener('click', loadVideo);
    
    urlInput.addEventListener('keypress', e => {
        if (e.key === 'Enter') loadVideo();
    });
    
    saveBtn.addEventListener('click', saveNotes);
  </script>
</body>
</html>
